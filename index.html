<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>World Wonders Photo Gallery</title>
    <link rel="stylesheet" href="css/gallery.css">
    <script src="js/gallery.js"></script>
</head>
<body onload="addTabIndex()">

    <header>
        <h1>World Wonders Interactive Gallery</h1>
    </header>

    <main>
        <div id="image">
            Hover over an image below or use the Tab key to display here.
        </div>

        <div class="gallery-container">
            <img class="preview" alt="The Great Wall of China" 
                 src="https://images.unsplash.com/photo-1508804185872-d7badad00f7d?w=500" 
                 onmouseover="upDate(this)" onmouseout="unDo()" 
                 onfocus="upDate(this)" onblur="unDo()">

            <img class="preview" alt="The Roman Colosseum in Italy" 
                 src="https://images.unsplash.com/photo-1552832230-c0197dd311b5?w=500" 
                 onmouseover="upDate(this)" onmouseout="unDo()" 
                 onfocus="upDate(this)" onblur="unDo()">

            <img class="preview" alt="The Ancient City of Petra, Jordan" 
                 src="https://images.unsplash.com/photo-1579606030136-1849bcdd1082?w=500" 
                 onmouseover="upDate(this)" onmouseout="unDo()" 
                 onfocus="upDate(this)" onblur="unDo()">

            <img class="preview" alt="Machu Picchu in Peru" 
                 src="https://images.unsplash.com/photo-1526392060635-9d6019884377?w=500" 
                 onmouseover="upDate(this)" onmouseout="unDo()" 
                 onfocus="upDate(this)" onblur="unDo()">

            <img class="preview" alt="Chichen Itza Mayan Ruins, Mexico" 
                 src="https://images.unsplash.com/photo-1518797814703-ed31ee241ef8?w=500" 
                 onmouseover="upDate(this)" onmouseout="unDo()" 
                 onfocus="upDate(this)" onblur="unDo()">

            <img class="preview" alt="The Taj Mahal in India" 
                 src="https://images.unsplash.com/photo-1564507592333-c60657eea023?w=500" 
                 onmouseover="upDate(this)" onmouseout="unDo()" 
                 onfocus="upDate(this)" onblur="unDo()">
        </div>
    </main>

    <footer>
        <p>&copy; 2026 World Wonders Gallery</p>
    </footer>

</body>
</html>
